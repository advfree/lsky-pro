server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Image cache
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|bmp|tif|psd)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Fonts & CSS & JS cache
    location ~* \.(css|js|woff|woff2|ttf|eot|otf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Thumbnails cache
    location /thumbnails/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Deny access to sensitive files
    location ~ /\.(env|git|svn) {
        deny all;
        return 404;
    }

    location ~ /(storage|bootstrap|cache|config|database)/ {
        deny all;
        return 404;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param PHP_VALUE "upload_max_filesize=100M \n post_max_size=100M \n max_execution_time=300";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    access_log /dev/stdout;
    error_log /dev/stderr;
}
