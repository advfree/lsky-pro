version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: lsky-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - lsky-storage:/var/www/html/storage
      - lsky-public:/var/www/html/public
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL:-http://localhost:8080}
      - APP_KEY=${APP_KEY:-}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=lsky
      - DB_USERNAME=lsky
      - DB_PASSWORD=${DB_PASSWORD:-lsky_secret_pass}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - lsky-network

  web:
    image: nginx:1.25-alpine
    container_name: lsky-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/compose.conf:/etc/nginx/conf.d/default.conf:ro
      - lsky-public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - lsky-network

  db:
    image: mysql:8.0
    container_name: lsky-db
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=lsky
      - MYSQL_USER=lsky
      - MYSQL_PASSWORD=${DB_PASSWORD:-lsky_secret_pass}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_secret_pass}
    volumes:
      - lsky-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - lsky-network

  redis:
    image: redis:7-alpine
    container_name: lsky-redis
    restart: unless-stopped
    volumes:
      - lsky-redis:/data
    networks:
      - lsky-network

networks:
  lsky-network:
    driver: bridge

volumes:
  lsky-storage:
    driver: local
  lsky-public:
    driver: local
  lsky-db:
    driver: local
  lsky-redis:
    driver: local
