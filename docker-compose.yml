services:
  app:
    image: lsky-pro-master-app
    build: .
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY:?Set APP_KEY in your .env before starting}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-lsky}
      DB_USERNAME: ${DB_USERNAME:-lsky}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in your .env before starting}
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      IMAGE_DRIVER: gd
    volumes:
      - storage:/var/www/html/storage
      - uploads:/var/www/html/public/uploads
      - thumbnails:/var/www/html/public/thumbnails
      - ${LSKY_STORAGE_BASE_PATH:-./docker-data/lskypro}:${LSKY_STORAGE_BASE_PATH:-/mnt/nas/lskypro}
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    build:
      context: .
      target: web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - uploads:/var/www/html/public/uploads:ro
      - thumbnails:/var/www/html/public/thumbnails:ro
      - storage:/var/www/html/storage:ro
      - ${LSKY_STORAGE_BASE_PATH:-./docker-data/lskypro}:${LSKY_STORAGE_BASE_PATH:-/mnt/nas/lskypro}:ro
    depends_on:
      - app

  scheduler:
    image: lsky-pro-master-app
    build: .
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY:?Set APP_KEY in your .env before starting}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-lsky}
      DB_USERNAME: ${DB_USERNAME:-lsky}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in your .env before starting}
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
      IMAGE_DRIVER: gd
    volumes:
      - storage:/var/www/html/storage
      - uploads:/var/www/html/public/uploads
      - thumbnails:/var/www/html/public/thumbnails
      - ${LSKY_STORAGE_BASE_PATH:-./docker-data/lskypro}:${LSKY_STORAGE_BASE_PATH:-/mnt/nas/lskypro}
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-lsky}
      MYSQL_USER: ${DB_USERNAME:-lsky}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in your .env before starting}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in your .env before starting}
    volumes:
      - mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis:/data

volumes:
  mysql:
  redis:
  storage:
  uploads:
  thumbnails:
